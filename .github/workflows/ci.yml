name: Streamlit Dashboard CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install streamlit pandas plotly
          
      - name: Verify imports
        run: |
          python -c "import streamlit, pandas, plotly.express; print('所有依赖导入成功')"
          
      - name: Check data file
        run: |
          if [ -f "sales_data.csv" ]; then
            python -c "
import pandas as pd
df = pd.read_csv('sales_data.csv')
print(f'数据文件: {df.shape[0]}行, {df.shape[1]}列')
print('列名:', list(df.columns))
            "
          else
            echo "警告: 未找到sales_data.csv文件"
          fi
          
      - name: Run simple test
        run: |
          # 简单运行app.py，检查是否报错
          python -c "
import subprocess
result = subprocess.run(['python', 'app.py', '--help'], 
                        capture_output=True, text=True, timeout=5)
if 'error' in result.stderr.lower():
    print('应用检查失败:', result.stderr[:200])
else:
    print('应用基本检查通过')
          "