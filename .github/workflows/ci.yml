name: Basic CI Check

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install packages
        run: pip install streamlit pandas plotly
          
      - name: Check imports
        run: python -c "import streamlit; import pandas; import plotly.express; print('✅ 所有库导入成功')"
          
      - name: Check if data exists
        run: ls -la sales_data.csv || echo "未找到数据文件"
          
      - name: Simple Python test
        run: python -c "print('✅ 基本Python环境正常')"